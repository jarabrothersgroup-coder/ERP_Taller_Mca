# ─────────────────────────────────────────────────────────
# AutomotiveOS Cloud ERP — Supabase CLI Configuration
# ─────────────────────────────────────────────────────────
# Inicialización: supabase init
# Link:          supabase link --project-ref <PROJECT_ID>
# Push:          supabase db push --linked
# Lint:          supabase db lint --linked
# Status:        supabase migration list --linked
# ─────────────────────────────────────────────────────────

[project]
id = "automotiveos-cloud-erp"

[api]
enabled = true
port = 54322
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ─── HashiCorp Vault (optional) ────────────────────────
[experimental]
# enabled = true
# vault_api_address = "http://localhost:8200"
# vault_token = "..."

# ─── Migrations ────────────────────────────────────────
# Supabase CLI looks for migrations in supabase/migrations/
# Naming convention: YYYYMMDDHHMMSS_description.sql
#
# Workflow:
#   1. supabase db diff --use-migra --schema public > supabase/migrations/YYYYMMDDHHMMSS_description.sql
#   2. supabase db push --linked
#   3. supabase migration list --linked
