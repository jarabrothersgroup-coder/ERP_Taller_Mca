        let currentPageIndex = 0;

        // Renderizar miniaturas en la barra lateral
        function renderThumbnails() {
            const container = document.getElementById('thumbnail-container');
            container.innerHTML = "";
            pages.forEach((page, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 rounded-lg transition-all flex items-center justify-between border ${
                    index === currentPageIndex 
                    ? 'bg-red-950/40 border-red-700 text-white shadow-lg' 
                    : 'bg-slate-900 border-slate-800 text-slate-400 hover:bg-slate-800 hover:text-white'
                }`;
                btn.onclick = () => selectPage(index);
                btn.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-red-500 uppercase">Pág. ${page.number}</span>
                        <span class="text-xs font-semibold truncate max-w-[150px]">${page.title}</span>
                    </div>
                    <span class="text-[10px] font-mono bg-slate-800 px-1.5 py-0.5 rounded text-slate-300">A4</span>
                `;
                container.appendChild(btn);
            });
        }

        // Seleccionar una página específica
        function selectPage(index) {
            currentPageIndex = index;
            renderPage();
            renderThumbnails();
            
            // Scroll suave para móviles en barra lateral horizontal
            const activeBtn = document.getElementById('thumbnail-container').children[index];
            activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        // Renderizar la página actual en el contenedor de PDF
        function renderPage() {
            const page = pages[currentPageIndex];
            const container = document.getElementById('pdf-view-container');
            
            // Estructura envolvente del PDF con cabeceras y pie de página de alta fidelidad
            container.innerHTML = `
                <!-- Cabecera de Página PDF (F fancyhdr de LaTeX) -->
                <div class="flex justify-between items-center border-b border-red-700 pb-2 mb-6 text-[9px] text-slate-500 font-bold uppercase tracking-wider">
                    <span>TALLER DEL PARAGUAY -- DESDE 1947</span>
                    <span class="text-red-700">Catálogo de Servicios y Alta Performance</span>
                </div>
                
                <!-- Contenido Dinámico de la Página -->
                <div class="flex-1 flex flex-col justify-between">
                    ${page.content}
                </div>
                
                <!-- Pie de Página PDF -->
                <div class="flex justify-between items-center border-t border-slate-200 pt-4 mt-6 text-[9px] text-slate-500 font-bold">
                    <span>Pág. ${page.number} de 13</span>
                    <span class="text-red-700">Tel: (021) 504-3176-9973</span>
                </div>
            `;

            // Actualizar controles
            document.getElementById('page-indicator').innerText = `${page.number} de 13`;
            document.getElementById('btn-prev').disabled = currentPageIndex === 0;
            document.getElementById('btn-next').disabled = currentPageIndex === pages.length - 1;
        }

        // Acciones de Anterior/Siguiente
        function prevPage() {
            if (currentPageIndex > 0) {
                selectPage(currentPageIndex - 1);
            }
        }

        function nextPage() {
            if (currentPageIndex < pages.length - 1) {
                selectPage(currentPageIndex + 1);
            }
        }

        // Inicializar el visualizador interactivo
        selectPage(0);
    </script>
