# ─────────────────────────────────────────────────────────
# AutomotiveOS Cloud ERP — Docker Compose (Development)
# ─────────────────────────────────────────────────────────
# Levanta el ecosistema completo para desarrollo local:
#   - ERP (Fastify + TypeScript)
#   - PostgreSQL (shared database)
#   - Redis (cache)
#   - Opcional: Twenty CRM + Evolution API
#
# Uso:
#   cp .env.example .env    # Configurar variables
#   docker compose up -d    # Levantar todo
#   docker compose logs -f  # Ver logs en tiempo real
#
# URLs después de levantar:
#   ERP:              http://localhost:3000
#   PostgreSQL:       localhost:5432
#   Redis:            localhost:6379
# ─────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL (Shared Database) ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-automotive_os}
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-automotive_os}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ─── Redis (Cache Layer) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-erp_redis_dev_password}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-erp_redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ─── ERP Backend (Fastify + TypeScript) ───────
  erp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_dev_password}@postgres:5432/${POSTGRES_DB:-automotive_os}?sslmode=disable
      STORAGE_PATH: /data/erp-storage
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      TENANT_SCHEMA_PREFIX: ${TENANT_SCHEMA_PREFIX:-tenant_}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # WhatsApp / Evolution API
      WHATSAPP_API_URL: http://evolution-api:8080
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-evolution-dev-api-key-change-me}
      # Twenty CRM
      TWENTY_API_URL: http://twenty-crm:3000
      TWENTY_API_KEY: ${TWENTY_API_KEY:-}
      TWENTY_GRAPHQL_URL: ${TWENTY_GRAPHQL_URL:-http://twenty-crm:3000/graphql}
      # SIFEN (optional)
      SIFEN_CERT_PATH: ${SIFEN_CERT_PATH:-}
      SIFEN_CERT_PASS: ${SIFEN_CERT_PASS:-}
      SIFEN_USE_TEST: ${SIFEN_USE_TEST:-true}
      # RAG
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - erp_storage:/data/erp-storage
      - ./src:/app/src
      - ./tests:/app/tests
      - ./engram.json:/app/engram.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network

volumes:
  postgres_data:
  redis_data:
  erp_storage:

networks:
  erp-network:
    driver: bridge
