  #         cpus: "0.5"
  #   environment:
  #     SERVER_URL: ${EVOLUTION_API_URL:-http://localhost:8080}
  #     AUTHENTICATION_API_KEY: ${WHATSAPP_API_KEY:-}
  #     DATABASE_PROVIDER: postgresql
  #     DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_local_password}@postgres:5432/${EVOLUTION_DB:-evolution_api}?sslmode=disable
  #     S3_ENABLED: "false"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - erp-network

  # ─── Twenty CRM (Opcional) ───────────────────
  # Descomentar si necesitas CRM
  # twenty-crm:
  #   image: twentycrm/twenty:latest
  #   container_name: erp-twenty-crm
  #   restart: unless-stopped
