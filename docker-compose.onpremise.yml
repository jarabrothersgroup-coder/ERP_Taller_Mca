  #   environment:
  #     PG_DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_local_password}@postgres:5432/${TWENTY_DB:-twenty_crm}?sslmode=disable
  #     SERVER_URL: ${TWENTY_SERVER_URL:-http://localhost:3001}
  #     ACCESS_TOKEN_SECRET: ${TWENTY_ACCESS_TOKEN_SECRET:-}
  #     LOGIN_TOKEN_SECRET: ${TWENTY_LOGIN_TOKEN_SECRET:-}
